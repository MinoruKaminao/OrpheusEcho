<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Orpheus Echo Mobile UI</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --text: #1a1f36;
      --sub: #5b6480;
      --line: #dce2f0;
      --primary: #2d6cff;
      --primary-pressed: #2054cc;
      --danger: #d92d20;
      --ok: #15803d;
      --radius: 14px;
      --shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      min-height: 100dvh;
      padding: 12px 12px 24px;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: color-mix(in srgb, var(--bg) 92%, white);
      backdrop-filter: blur(8px);
      padding: 10px 4px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--sub);
      font-size: 0.85rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      margin-bottom: 12px;
    }

    .card h2 {
      font-size: 0.98rem;
      margin: 0 0 10px;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .grid.two {
      grid-template-columns: 1fr;
    }

    @media (min-width: 480px) {
      .grid.two {
        grid-template-columns: 1fr 1fr;
      }
    }

    label {
      display: block;
      font-size: 0.78rem;
      color: var(--sub);
      margin-bottom: 4px;
      font-weight: 600;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      font-size: 0.95rem;
      background: white;
      color: var(--text);
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid color-mix(in srgb, var(--primary) 20%, transparent);
      border-color: var(--primary);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row > * {
      flex: 1;
    }

    .btn {
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:active {
      background: var(--primary-pressed);
    }

    .btn.secondary {
      background: #eef2ff;
      color: #2d3e8f;
      border: 1px solid #c9d4ff;
    }

    .btn.warn {
      background: #fff1f2;
      color: var(--danger);
      border: 1px solid #ffc7cd;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .chip {
      font-size: 0.74rem;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid #d6def6;
      background: #f3f6ff;
      color: #3e4a78;
    }

    .status {
      margin-top: 8px;
      font-size: 0.82rem;
      color: var(--sub);
    }

    .status.ok {
      color: var(--ok);
      font-weight: 700;
    }

    .status.err {
      color: var(--danger);
      font-weight: 700;
    }

    pre {
      margin: 8px 0 0;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #f9fbff;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.76rem;
      line-height: 1.45;
      max-height: 240px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="title">Orpheus Echo モバイルUI</h1>
      <p class="subtitle">片手操作向け: セッション作成〜候補登録〜試行〜結果確認</p>
    </header>

    <section class="card">
      <h2>1) セッション作成</h2>
      <form id="sessionForm" class="grid">
        <div class="grid two">
          <div>
            <label for="species">種類</label>
            <select id="species" required>
              <option value="dog">dog</option>
              <option value="cat">cat</option>
            </select>
          </div>
          <div>
            <label for="tempAnimalId">仮ID</label>
            <input id="tempAnimalId" placeholder="tmp_001" />
          </div>
        </div>
        <div>
          <label for="locationText">場所</label>
          <input id="locationText" placeholder="例: Tokyo station" />
        </div>
        <div class="grid two">
          <div>
            <label for="coatColor">毛色</label>
            <input id="coatColor" placeholder="brown" />
          </div>
          <div>
            <label for="ageHint">年齢ヒント</label>
            <input id="ageHint" placeholder="young" />
          </div>
        </div>
        <div class="grid two">
          <div>
            <label for="countryCode">国コード</label>
            <input id="countryCode" placeholder="JP" />
          </div>
          <div>
            <label for="languageCode">言語コード</label>
            <input id="languageCode" placeholder="ja" />
          </div>
        </div>
        <div class="row">
          <label for="multiCountryMode" style="margin: 0;">多国モード</label>
          <input id="multiCountryMode" type="checkbox" style="max-width: 32px; min-height: 32px;" />
        </div>
        <div>
          <label for="notes">メモ</label>
          <textarea id="notes" placeholder="備考"></textarea>
        </div>
        <button class="btn" type="submit">セッション作成</button>
      </form>
      <p id="sessionStatus" class="status"></p>
      <div class="chips">
        <span class="chip">session_id: <strong id="activeSessionId">未設定</strong></span>
      </div>
    </section>

    <section class="card">
      <h2>2) 候補名登録</h2>
      <form id="candidateForm" class="grid">
        <div>
          <label for="candidateName">候補名</label>
          <input id="candidateName" required placeholder="Pochi" />
        </div>
        <div class="grid two">
          <div>
            <label for="candidateSpecies">種類</label>
            <select id="candidateSpecies">
              <option value="dog">dog</option>
              <option value="cat">cat</option>
            </select>
          </div>
          <div>
            <label for="candidateCountryCode">国コード</label>
            <input id="candidateCountryCode" placeholder="JP" />
          </div>
        </div>
        <div>
          <label for="candidateLanguageCode">言語コード</label>
          <input id="candidateLanguageCode" placeholder="ja" />
        </div>
        <button class="btn secondary" type="submit">候補追加</button>
      </form>
      <p id="candidateStatus" class="status"></p>
      <div class="chips">
        <span class="chip">candidate_id: <strong id="activeCandidateId">未設定</strong></span>
      </div>
    </section>

    <section class="card">
      <h2>3) 試行登録 & 特徴量</h2>
      <form id="trialForm" class="grid">
        <div class="grid two">
          <div>
            <label for="trialCandidateId">candidate_id</label>
            <input id="trialCandidateId" placeholder="候補ID" />
          </div>
          <div>
            <label for="voiceType">voice_type</label>
            <input id="voiceType" required placeholder="normal" />
          </div>
        </div>
        <div class="grid two">
          <div>
            <label for="variantText">variant_text</label>
            <input id="variantText" required placeholder="Pochi" />
          </div>
          <div>
            <label for="modulationType">modulation_type</label>
            <input id="modulationType" required placeholder="flat" />
          </div>
        </div>
        <button class="btn secondary" type="submit">試行登録</button>
      </form>
      <p id="trialStatus" class="status"></p>
      <div class="chips">
        <span class="chip">trial_id: <strong id="activeTrialId">未設定</strong></span>
      </div>

      <form id="featureForm" class="grid" style="margin-top: 12px;">
        <div class="grid two">
          <div><label for="gaze">gaze_shift_score</label><input id="gaze" type="number" step="0.1" value="0.6" /></div>
          <div><label for="ear">ear_motion_score</label><input id="ear" type="number" step="0.1" value="0.6" /></div>
          <div><label for="head">head_turn_score</label><input id="head" type="number" step="0.1" value="0.6" /></div>
          <div><label for="posture">posture_change_score</label><input id="posture" type="number" step="0.1" value="0.6" /></div>
          <div><label for="approach">approach_score</label><input id="approach" type="number" step="0.1" value="0.6" /></div>
          <div><label for="vocalization">vocalization_score</label><input id="vocalization" type="number" step="0.1" value="0.6" /></div>
          <div><label for="repeatability">repeatability_score</label><input id="repeatability" type="number" step="0.1" value="0.6" /></div>
        </div>
        <button class="btn secondary" type="submit">特徴量保存</button>
      </form>
      <p id="featureStatus" class="status"></p>
    </section>

    <section class="card">
      <h2>4) ランキング & 結果</h2>
      <div class="row">
        <button id="rankBtn" class="btn">rank</button>
        <button id="refineBtn" class="btn secondary">refine</button>
      </div>
      <div class="row" style="margin-top: 8px;">
        <button id="resultBtn" class="btn secondary">results</button>
        <button id="closeBtn" class="btn warn">close</button>
      </div>
      <p id="resultStatus" class="status"></p>
      <pre id="resultPreview">ここにレスポンスを表示します。</pre>
    </section>
  </main>

  <script>
    const byId = (id) => document.getElementById(id);

    const state = {
      sessionId: "",
      candidateId: "",
      trialId: "",
    };

    function setStatus(id, message, type = "") {
      const el = byId(id);
      el.className = `status ${type}`.trim();
      el.textContent = message;
    }

    function syncStateView() {
      byId("activeSessionId").textContent = state.sessionId || "未設定";
      byId("activeCandidateId").textContent = state.candidateId || "未設定";
      byId("activeTrialId").textContent = state.trialId || "未設定";
      byId("trialCandidateId").value = byId("trialCandidateId").value || state.candidateId || "";
    }

    async function api(path, method = "GET", body) {
      const options = { method, headers: { "Content-Type": "application/json" } };
      if (body) options.body = JSON.stringify(body);
      const response = await fetch(`/api/v1${path}`, options);
      const json = await response.json();
      if (!response.ok || json.error) {
        throw new Error(json?.error?.message || `HTTP ${response.status}`);
      }
      return json;
    }

    byId("sessionForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = {
        species: byId("species").value,
        temp_animal_id: byId("tempAnimalId").value || null,
        location_text: byId("locationText").value || null,
        coat_color: byId("coatColor").value || null,
        age_hint: byId("ageHint").value || null,
        country_code: byId("countryCode").value || null,
        language_code: byId("languageCode").value || null,
        multi_country_mode: byId("multiCountryMode").checked,
        notes: byId("notes").value || null,
      };
      try {
        const res = await api("/sessions", "POST", payload);
        state.sessionId = res.data.session_id;
        setStatus("sessionStatus", `作成成功: ${state.sessionId}`, "ok");
        syncStateView();
      } catch (err) {
        setStatus("sessionStatus", `作成失敗: ${err.message}`, "err");
      }
    });

    byId("candidateForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = {
        name: byId("candidateName").value,
        species: byId("candidateSpecies").value,
        country_code: byId("candidateCountryCode").value || null,
        language_code: byId("candidateLanguageCode").value || null,
      };
      try {
        const res = await api("/candidates", "POST", payload);
        state.candidateId = res.data.candidate_id;
        setStatus("candidateStatus", `追加成功: ${state.candidateId}`, "ok");
        syncStateView();
      } catch (err) {
        setStatus("candidateStatus", `追加失敗: ${err.message}`, "err");
      }
    });

    byId("trialForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!state.sessionId) {
        setStatus("trialStatus", "先にセッションを作成してください", "err");
        return;
      }

      const candidateId = byId("trialCandidateId").value || state.candidateId;
      const payload = {
        candidate_id: candidateId,
        variant_text: byId("variantText").value,
        voice_type: byId("voiceType").value,
        modulation_type: byId("modulationType").value,
        played_at: new Date().toISOString(),
        manual_flag: null,
      };

      try {
        const res = await api(`/sessions/${state.sessionId}/trials`, "POST", payload);
        state.trialId = res.data.trial_id;
        setStatus("trialStatus", `試行登録成功: ${state.trialId}`, "ok");
        syncStateView();
      } catch (err) {
        setStatus("trialStatus", `試行登録失敗: ${err.message}`, "err");
      }
    });

    byId("featureForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!state.sessionId || !state.trialId) {
        setStatus("featureStatus", "先にセッションと試行を作成してください", "err");
        return;
      }

      const toNum = (id) => Number(byId(id).value);
      const payload = {
        gaze_shift_score: toNum("gaze"),
        ear_motion_score: toNum("ear"),
        head_turn_score: toNum("head"),
        posture_change_score: toNum("posture"),
        approach_score: toNum("approach"),
        vocalization_score: toNum("vocalization"),
        repeatability_score: toNum("repeatability"),
      };

      try {
        const res = await api(`/sessions/${state.sessionId}/trials/${state.trialId}/features`, "POST", payload);
        setStatus("featureStatus", "特徴量保存成功", "ok");
        byId("resultPreview").textContent = JSON.stringify(res, null, 2);
      } catch (err) {
        setStatus("featureStatus", `特徴量保存失敗: ${err.message}`, "err");
      }
    });

    async function runAndPreview(action, path) {
      if (!state.sessionId) {
        setStatus("resultStatus", "先にセッションを作成してください", "err");
        return;
      }
      try {
        const res = await api(`/sessions/${state.sessionId}${path}`, "POST");
        setStatus("resultStatus", `${action} 成功`, "ok");
        byId("resultPreview").textContent = JSON.stringify(res, null, 2);
      } catch (err) {
        setStatus("resultStatus", `${action} 失敗: ${err.message}`, "err");
      }
    }

    byId("rankBtn").addEventListener("click", () => runAndPreview("rank", "/rank"));
    byId("refineBtn").addEventListener("click", () => runAndPreview("refine", "/refine"));

    byId("resultBtn").addEventListener("click", async () => {
      if (!state.sessionId) {
        setStatus("resultStatus", "先にセッションを作成してください", "err");
        return;
      }
      try {
        const res = await api(`/sessions/${state.sessionId}/results`);
        setStatus("resultStatus", "results 取得成功", "ok");
        byId("resultPreview").textContent = JSON.stringify(res, null, 2);
      } catch (err) {
        setStatus("resultStatus", `results 取得失敗: ${err.message}`, "err");
      }
    });

    byId("closeBtn").addEventListener("click", async () => {
      if (!state.sessionId) {
        setStatus("resultStatus", "先にセッションを作成してください", "err");
        return;
      }
      try {
        const res = await api(`/sessions/${state.sessionId}/close`, "POST");
        setStatus("resultStatus", "close 成功", "ok");
        byId("resultPreview").textContent = JSON.stringify(res, null, 2);
      } catch (err) {
        setStatus("resultStatus", `close 失敗: ${err.message}`, "err");
      }
    });

    syncStateView();
  </script>
</body>
</html>
